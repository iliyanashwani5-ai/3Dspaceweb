<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Space Exploration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <h1>Celestial Voyager</h1>
        <p>Scroll or move your mouse to explore the sector.</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
    <script>
    
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


const loader = new THREE.TextureLoader();

const surfaceTexture = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');


const planet = new THREE.Mesh(
    new THREE.SphereGeometry(2, 32, 32),
    new THREE.MeshStandardMaterial({ map: surfaceTexture })
);
scene.add(planet);


const ring = new THREE.Mesh(
    new THREE.TorusGeometry(3.8, 0.1, 16, 100),
    new THREE.MeshStandardMaterial({ color: 0xffd700 })
);
ring.rotation.x = Math.PI / 2;
scene.add(ring);


const box = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),  
    new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
);
box.position.set(6, 3, -5);
scene.add(box);


const monolith = new THREE.Mesh(
    new THREE.TetrahedronGeometry(1.5),
    new THREE.MeshStandardMaterial({ color: 0x00ffcc, wireframe: true })
);
monolith.position.set(-6, -2, -4);
scene.add(monolith);


const beacon = new THREE.Mesh(
    new THREE.OctahedronGeometry(1.2),
    new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 })
);
beacon.position.set(3, -5, -2);
scene.add(beacon);

const tank = new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 0.6, 2, 20),
    new THREE.MeshStandardMaterial({ color: 0x555555 })
);
tank.position.set(-4, 5, -6);
scene.add(tank); 


const sunLight = new THREE.PointLight(0xffffff, 1.2, 100);
sunLight.position.set(10, 10, 10);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x404040)); 


const starGeo = new THREE.BufferGeometry();
const starCount = 6000;
const posArray = new Float32Array(starCount * 3);
for(let i=0; i < starCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 100;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.02, color: 0xffffff }));
scene.add(starField);

camera.position.z = 15;


function animate() {




    planet.rotation.y += 0.003;
    ring.rotation.z += 0.008;
    box.rotation.x += 0.01;
    box.rotation.y += 0.01;
    monolith.rotation.y += 0.02;
    beacon.rotation.y += 0.04;
    tank.rotation.z += 0.01;
    

    starField.rotation.y += 0.0002;

   renderer.render(scene, camera);
}


window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

</script>
</body>
</html>
